<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{font-size:16px;-webkit-text-size-adjust:100%;}
body{font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans','Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif;background:#f2f2f7;color:#1c1c1e;min-height:100vh;min-height:-webkit-fill-available;overflow-x:hidden;-webkit-tap-highlight-color:transparent;}
#app{max-width:430px;margin:0 auto;background:#f2f2f7;height:100vh;height:-webkit-fill-available;max-height:100vh;display:flex;flex-direction:column;position:relative;}
#root{flex:1;display:flex;flex-direction:column;min-height:0;overflow:hidden;}
.sbar{background:#fff;padding:env(safe-area-inset-top,12px) 16px 0;display:flex;justify-content:space-between;align-items:center;border-bottom:0.5px solid #e5e5ea;min-height:calc(env(safe-area-inset-top,12px) + 20px);}
.sbar span{font-size:12px;color:#8e8e93;}
.topbar{background:#fff;padding:14px 16px 12px;display:flex;align-items:center;justify-content:space-between;border-bottom:0.5px solid #e5e5ea;min-height:52px;}
.topbar-title{font-size:18px;font-weight:600;color:#1c1c1e;}
.topbar-back{font-size:17px;color:#007aff;cursor:pointer;padding:4px 8px 4px 0;min-width:44px;min-height:44px;display:flex;align-items:center;}
.topbar-action{font-size:15px;color:#007aff;font-weight:500;cursor:pointer;padding:8px;min-width:44px;min-height:44px;display:flex;align-items:center;justify-content:flex-end;}
.tabs{background:#fff;display:flex;border-bottom:0.5px solid #e5e5ea;}
.tab{flex:1;text-align:center;font-size:13px;padding:10px 4px 9px;color:#8e8e93;border-bottom:2px solid transparent;cursor:pointer;-webkit-user-select:none;user-select:none;min-height:44px;display:flex;align-items:center;justify-content:center;}
.tab.on{color:#007aff;border-bottom-color:#007aff;font-weight:500;}
.content{flex:1;padding:12px;display:flex;flex-direction:column;gap:10px;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:12px;}
.card{background:#fff;border-radius:12px;padding:14px 14px 12px;cursor:pointer;-webkit-user-select:none;user-select:none;position:relative;border:0.5px solid rgba(0,0,0,0.08);}
.card:active{opacity:0.85;}
.card.urg-saiyusen{border-left:4px solid #ef4444;border-radius:0 12px 12px 0;}
.card.urg-kinkyu{border-left:4px solid #f97316;border-radius:0 12px 12px 0;}
.card.urg-junkinkyu{border-left:4px solid #eab308;border-radius:0 12px 12px 0;}
.card.urg-antei{border-left:4px solid #22c55e;border-radius:0 12px 12px 0;}
.card.urg-none{border-left:4px solid #93c5fd;border-radius:0 12px 12px 0;}
.av{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;flex-shrink:0;}
.av-b{background:#dbeafe;color:#1e40af;}.av-g{background:#dcfce7;color:#166534;}.av-a{background:#fef3c7;color:#92400e;}.av-p{background:#ede9fe;color:#5b21b6;}.av-t{background:#d1fae5;color:#065f46;}.av-r{background:#ffe4e6;color:#9f1239;}.av-c{background:#dcfce7;color:#14532d;}.av-ce{background:#fef9c3;color:#713f12;}
.notif-badge{background:#ff3b30;color:#fff;border-radius:10px;font-size:12px;padding:2px 8px;font-weight:600;cursor:pointer;min-width:28px;text-align:center;min-height:36px;display:flex;align-items:center;justify-content:center;}
.status-badge{font-size:12px;border-radius:6px;padding:3px 8px;font-weight:500;flex-shrink:0;display:inline-block;}
.s-pre{background:#d1fae5;color:#065f46;}.s-tri{background:#ede9fe;color:#5b21b6;}.s-exam{background:#dbeafe;color:#1e40af;}.s-test{background:#fef3c7;color:#92400e;}.s-admit{background:#dcfce7;color:#166534;}.s-done{background:#f3f4f6;color:#4b5563;}
.ptag{font-size:12px;background:#dbeafe;color:#1e40af;border-radius:5px;padding:2px 7px;display:inline-block;font-weight:500;}
.pill{display:inline-flex;align-items:center;font-size:12px;font-weight:500;border-radius:6px;padding:3px 9px;margin-bottom:5px;}
.pill-ct{background:#fef3c7;color:#92400e;}.pill-blood{background:#fee2e2;color:#991b1b;}.pill-arrive{background:#d1fae5;color:#065f46;}.pill-diag{background:#ede9fe;color:#5b21b6;}.pill-admit{background:#dcfce7;color:#166534;}.pill-done{background:#dcfce7;color:#166534;}.pill-op{background:#fce7f3;color:#9d174d;}
.role-tag{font-size:11px;border-radius:5px;padding:2px 8px;font-weight:500;}
.role-er_nurse{background:#dbeafe;color:#1e40af;}.role-er_doctor{background:#dcfce7;color:#166534;}.role-radiology{background:#fef3c7;color:#92400e;}.role-lab{background:#ede9fe;color:#5b21b6;}.role-ward_nurse{background:#d1fae5;color:#065f46;}.role-oncall{background:#ffe4e6;color:#9f1239;}
.f-sender{font-size:14px;font-weight:600;color:#1c1c1e;}.f-time{font-size:12px;color:#8e8e93;}.f-body{font-size:13px;color:#3c3c43;line-height:1.55;}.f-label{font-size:12px;color:#8e8e93;}.f-head{font-size:15px;font-weight:600;color:#1c1c1e;}.f-sub{font-size:13px;color:#8e8e93;}
.mention{color:#007aff;font-weight:500;}.warn{font-size:12px;color:#ff9500;font-weight:500;}.ack-done{font-size:12px;color:#34c759;font-weight:500;}
.ack-btn{font-size:13px;color:#007aff;border:1px solid #007aff;border-radius:8px;padding:7px 14px;background:#fff;cursor:pointer;min-height:36px;font-weight:500;-webkit-user-select:none;}
.ack-btn:active{background:#dbeafe;}
.btn{flex:1;padding:14px 12px;border-radius:12px;font-size:15px;font-weight:500;border:1px solid #d1d1d6;background:#fff;color:#1c1c1e;cursor:pointer;text-align:center;min-height:50px;-webkit-user-select:none;}
.btn:active{background:#f2f2f7;}
.btn-primary{background:#007aff;color:#fff;border-color:#007aff;}.btn-primary:active{background:#0062cc;}
.btn-full{flex:none;width:100%;}
.footer{background:#fff;padding:10px 14px calc(10px + env(safe-area-inset-bottom,0px));display:flex;gap:10px;border-top:0.5px solid #e5e5ea;position:sticky;bottom:0;z-index:50;}
.botnav{background:#fff;display:flex;border-top:0.5px solid #e5e5ea;padding-bottom:env(safe-area-inset-bottom,0px);position:sticky;bottom:0;z-index:50;}
.bni{flex:1;text-align:center;padding:10px 0 8px;font-size:10px;color:#8e8e93;cursor:pointer;position:relative;min-height:50px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;-webkit-user-select:none;}
.bni.on{color:#007aff;}.bni svg{width:22px;height:22px;}
.bni-badge{position:absolute;top:6px;right:calc(50% - 20px);background:#ff3b30;color:#fff;border-radius:8px;font-size:10px;padding:1px 5px;font-weight:600;}
.prog-wrap{height:4px;background:#e5e5ea;border-radius:2px;margin:7px 0;position:relative;}
.prog-fill{height:4px;border-radius:2px;}
.prog-dot{width:10px;height:10px;border-radius:50%;position:absolute;top:-3px;transform:translateX(-50%);border:2px solid #fff;}
.sect-label{font-size:12px;color:#8e8e93;padding:6px 4px 4px;font-weight:500;letter-spacing:0.04em;}
.tl-entry{display:flex;gap:10px;padding-bottom:14px;}
.tl-col{display:flex;flex-direction:column;align-items:center;flex-shrink:0;width:12px;}
.tl-dot{width:12px;height:12px;border-radius:50%;flex-shrink:0;border:2px solid #fff;}
.tl-line{width:2px;background:#e5e5ea;flex:1;margin-top:3px;min-height:16px;}
.vital-chip{font-size:12px;background:#f2f2f7;border-radius:6px;padding:3px 8px;color:#3c3c43;}
.vitals-row{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px;}
.pt-header{background:#fff;padding:12px 16px 10px;border-bottom:0.5px solid #e5e5ea;}
.overlay{position:absolute;inset:0;background:rgba(0,0,0,0.45);display:flex;flex-direction:column;justify-content:flex-end;z-index:100;-webkit-backdrop-filter:blur(2px);}
.sheet{background:#f2f2f7;border-radius:18px 18px 0 0;padding:12px 16px calc(16px + env(safe-area-inset-bottom,0px));max-height:85vh;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.sheet-handle{width:36px;height:4px;background:#c7c7cc;border-radius:2px;margin:0 auto 14px;}
.sheet-title{font-size:16px;font-weight:600;color:#1c1c1e;margin-bottom:14px;text-align:center;}
.action-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px;}
.action-tile{background:#fff;border:1px solid #e5e5ea;border-radius:12px;padding:12px 6px;text-align:center;font-size:12px;color:#1c1c1e;cursor:pointer;min-height:72px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;-webkit-user-select:none;}
.action-tile:active{background:#f2f2f7;}.action-tile.sel{border-color:#007aff;background:#dbeafe;color:#1e40af;}
.action-icon{font-size:22px;}
.mention-chips{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;}
.mchip{font-size:13px;border:1px solid #d1d1d6;border-radius:20px;padding:7px 14px;color:#3c3c43;background:#fff;cursor:pointer;min-height:36px;display:flex;align-items:center;-webkit-user-select:none;}
.mchip:active{background:#f2f2f7;}.mchip.sel{background:#dbeafe;color:#1e40af;border-color:#007aff;}
.form-group{margin-bottom:14px;}
.form-label{font-size:13px;color:#8e8e93;margin-bottom:6px;display:block;}
.form-input{width:100%;padding:12px 14px;border:1px solid #d1d1d6;border-radius:10px;background:#fff;color:#1c1c1e;font-size:16px;font-family:inherit;outline:none;-webkit-appearance:none;appearance:none;}
.form-input:focus{border-color:#007aff;}
textarea.form-input{resize:none;height:80px;line-height:1.5;}
.sex-btns{display:flex;gap:8px;}
.sex-btn{flex:1;padding:12px;border-radius:10px;border:1px solid #d1d1d6;background:#fff;color:#3c3c43;font-size:15px;cursor:pointer;text-align:center;min-height:46px;-webkit-user-select:none;}
.sex-btn:active{background:#f2f2f7;}.sex-btn.sel{border-color:#007aff;background:#dbeafe;color:#1e40af;}
.tag-chips{display:flex;gap:8px;flex-wrap:wrap;}
.tchip{font-size:13px;border:1px solid #d1d1d6;border-radius:20px;padding:7px 14px;color:#3c3c43;background:#fff;cursor:pointer;min-height:36px;-webkit-user-select:none;}
.tchip:active{background:#f2f2f7;}.tchip.sel{background:#fee2e2;color:#991b1b;border-color:#ff3b30;}
.chip-grid-2{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;}
.chip-grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
.chip-grid-4{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:6px;}
.gchip{font-size:13px;border:1px solid #d1d1d6;border-radius:10px;padding:10px 4px;color:#3c3c43;background:#fff;cursor:pointer;min-height:44px;text-align:center;display:flex;align-items:center;justify-content:center;-webkit-user-select:none;line-height:1.3;}
.gchip:active{background:#f2f2f7;}
.gchip.u1{border-color:#ff3b30;background:#fff0f0;color:#c0392b;}.gchip.u1.sel{background:#ff3b30;color:#fff;}
.gchip.u2{border-color:#ff9500;background:#fff8ee;color:#b35c00;}.gchip.u2.sel{background:#ff9500;color:#fff;}
.gchip.u3{border-color:#ffcc00;background:#fffbe6;color:#7a5c00;}.gchip.u3.sel{background:#ffcc00;color:#5c4400;}
.gchip.u4{border-color:#34c759;background:#f0fff4;color:#1a7a3a;}.gchip.u4.sel{background:#34c759;color:#fff;}
.gchip.jcs.sel{border-color:#007aff;background:#dbeafe;color:#1e40af;}
.gchip.tr.sel{border-color:#af52de;background:#f5f0ff;color:#6a1fa0;}
.gchip.pr.sel{border-color:#ff9500;background:#fff8ee;color:#b35c00;}
.sec-head{font-size:11px;color:#8e8e93;font-weight:600;letter-spacing:0.05em;padding:14px 0 8px;margin-bottom:2px;}
.notif-card{background:#fff;border-radius:12px;border:0.5px solid rgba(0,0,0,0.08);padding:14px 14px 12px;display:flex;gap:12px;}
.notif-card.unread{border-left:4px solid #007aff;border-radius:0 12px 12px 0;}
.notif-card.urgent{border-left:4px solid #ff3b30;border-radius:0 12px 12px 0;}
.notif-icon{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.row{display:flex;align-items:center;gap:10px;}
.row-sb{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;}
.mt4{margin-top:4px;}.mt8{margin-top:8px;}
.empty-state{text-align:center;padding:3rem 1rem;color:#8e8e93;font-size:15px;}
.section-card{background:#fff;border-radius:12px;padding:4px 14px;border:0.5px solid rgba(0,0,0,0.08);}
.login-wrap{flex:1;display:flex;flex-direction:column;align-items:center;padding:24px 20px calc(24px + env(safe-area-inset-bottom,0px));overflow-y:auto;-webkit-overflow-scrolling:touch;}
.login-logo{font-size:52px;margin-bottom:8px;}
.login-title{font-size:28px;font-weight:700;color:#1c1c1e;margin-bottom:4px;}
.login-sub{font-size:14px;color:#8e8e93;margin-bottom:20px;}
.login-notice{background:#fef3c7;color:#92400e;border-radius:10px;padding:10px 14px;font-size:12px;width:100%;text-align:center;margin-bottom:20px;}
.user-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;width:100%;}
.user-tile{background:#fff;border:1px solid #e5e5ea;border-radius:16px;padding:18px 10px 14px;text-align:center;cursor:pointer;-webkit-user-select:none;display:flex;flex-direction:column;align-items:center;gap:6px;}
.user-tile:active{background:#f2f2f7;border-color:#007aff;}

.user-tile-name{font-size:13px;font-weight:600;color:#1c1c1e;}
.user-tile-role{font-size:11px;color:#8e8e93;}
.me-btn{display:flex;align-items:center;gap:6px;cursor:pointer;padding:4px 0 4px 8px;border-radius:8px;min-height:44px;-webkit-user-select:none;}
.me-btn:active{background:#f2f2f7;}
.me-av{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;}
.profile-header{background:#fff;padding:24px 20px 20px;display:flex;flex-direction:column;align-items:center;gap:10px;border-bottom:0.5px solid #e5e5ea;}
.profile-av{width:72px;height:72px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:30px;}
.profile-name{font-size:20px;font-weight:600;color:#1c1c1e;}
.profile-dept{font-size:14px;color:#8e8e93;}
.profile-row{display:flex;justify-content:space-between;align-items:center;padding:14px 0;border-bottom:0.5px solid #e5e5ea;min-height:50px;}

.profile-key{font-size:15px;color:#1c1c1e;}
.profile-val{font-size:15px;color:#8e8e93;}

/* ── Realtime indicator ── */
.rt-dot{width:8px;height:8px;border-radius:50%;background:#34c759;display:inline-block;margin-right:4px;animation:pulse 2s infinite;}
.rt-dot.off{background:#ff3b30;animation:none;}
.rt-dot.connecting{background:#ff9500;}

/* ── Toast ── */
.toast{position:absolute;bottom:calc(80px + env(safe-area-inset-bottom,0px));left:50%;transform:translateX(-50%);background:#1c1c1e;color:#fff;border-radius:20px;padding:10px 20px;font-size:13px;font-weight:500;white-space:nowrap;z-index:200;opacity:0;transition:opacity .25s;pointer-events:none;}

.setup-wrap{flex:1;display:flex;flex-direction:column;padding:20px;gap:14px;overflow-y:auto;}
.setup-title{font-size:20px;font-weight:600;color:#1c1c1e;margin-bottom:4px;}
.setup-sub{font-size:13px;color:#8e8e93;line-height:1.6;}
.setup-step{background:#fff;border-radius:12px;padding:16px;border:0.5px solid rgba(0,0,0,0.08);}
.setup-step-num{font-size:11px;font-weight:600;color:#007aff;margin-bottom:6px;}
.setup-step-title{font-size:15px;font-weight:600;color:#1c1c1e;margin-bottom:8px;}
.setup-code{background:#1c1c1e;color:#e2e8f0;border-radius:8px;padding:12px;font-size:12px;font-family:monospace;line-height:1.7;overflow-x:auto;-webkit-overflow-scrolling:touch;}
.setup-code .kw{color:#93c5fd;}.setup-code .str{color:#86efac;}.setup-code .cm{color:#6b7280;}
.copy-btn{font-size:12px;color:#007aff;border:1px solid #007aff;border-radius:6px;padding:4px 10px;background:#fff;cursor:pointer;margin-top:8px;display:inline-block;}

<script>
/* =====================================================
   ER Feed v2 — Supabase Realtime 版
   ===================================================== */

/* ---------- Supabase 設定 ----------
   setup画面で入力した値を localStorage に保存して使う
   ---------------------------------- */
const CFG_KEY = 'erfeed_supabase_cfg';
function getCfg() {
  try { return JSON.parse(localStorage.getItem(CFG_KEY) || 'null'); } catch{ return null; }
}
function setCfg(url, key) {
  localStorage.setItem(CFG_KEY, JSON.stringify({url, key}));
}

/* ---------- utils ---------- */
const $ = id => document.getElementById(id);
const esc = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const elapsed = ts => {
  const m = Math.round((Date.now() - new Date(ts).getTime()) / 60000);
  if(m < 1) return 'たった今';
  if(m < 60) return m + '分前';
  return Math.round(m/60) + '時間前';
};
const fmtTime = ts => {
  const d = new Date(ts);
  return d.getHours().toString().padStart(2,'0') + ':' + d.getMinutes().toString().padStart(2,'0');
};
const statusLabel = s => ({pre_arrival:'搬送前',triage:'トリアージ',examination:'診察中',in_test:'検査中',admission:'入院調整',done:'完了'}[s]||s);
const statusCls   = s => ({pre_arrival:'s-pre',triage:'s-tri',examination:'s-exam',in_test:'s-test',admission:'s-admit',done:'s-done'}[s]||'s-done');
const progPct     = s => ({pre_arrival:8,triage:22,examination:38,in_test:60,admission:82,done:100}[s]||8);
const progColor   = s => ({pre_arrival:'#34c759',triage:'#af52de',examination:'#007aff',in_test:'#ff9500',admission:'#30b83f',done:'#8e8e93'}[s]||'#8e8e93');
const pillFor     = t => ({'CT依頼':'pill-ct','MRI依頼':'pill-ct','心カテ依頼':'pill-ct','採血依頼':'pill-blood','輸血依頼':'pill-blood','緊急透析依頼':'pill-blood','来院・トリアージ':'pill-arrive','診察完了':'pill-diag','入院決定':'pill-admit','手術決定':'pill-op','CT完了':'pill-done','検査完了':'pill-done','搬送前通知':'pill-arrive'}[t]||'pill-diag');

/* アクションバッジのスタイル（背景色・文字色・ボーダー） */
function actBadgeStyle(tag) {
  const t = tag || '';
  if(t==='搬送前通知'||t==='来院・トリアージ')
    return 'background:#dcfce7;color:#166534;border:0.5px solid #86efac;';
  if(t==='CT依頼'||t==='MRI依頼'||t==='心カテ依頼')
    return 'background:#fef3c7;color:#92400e;border:0.5px solid #fde68a;';
  if(t==='輸血依頼'||t==='緊急透析依頼')
    return 'background:#fee2e2;color:#991b1b;border:0.5px solid #fca5a5;';

/* ---------- Supabase client ---------- */
let SB = null;  // Supabase client instance

function initSupabase(url, key) {
  if(!url || !key) return false;
  try {
    SB = window.supabase.createClient(url, key);
    return true;
  } catch(e) {
    console.error('Supabase init error:', e);
    return false;
  }
}

/* ---------- DB操作 ---------- */
async function loadAll() {
  if(!SB) return;
  try {
    const [ptRes, postRes, notifRes] = await Promise.all([
      SB.from('patients').select('*').order('created_at', {ascending:false}),
      SB.from('posts').select('*').order('posted_at', {ascending:false}),
      SB.from('notifications').select('*').order('created_at', {ascending:false}),
    ]);
    if(ptRes.data)    S.patients = ptRes.data;
    if(postRes.data)  S.posts    = postRes.data;
    if(notifRes.data) S.notifs   = notifRes.data;
    S.dbReady = true;
    updateRtStatus('live');
    render();
  } catch(e) {
    console.error('loadAll error:', e);
    updateRtStatus('offline');
  }
}

function subscribeRealtime() {
  if(!SB) return;
  SB.channel('er-feed-changes')
    .on('postgres_changes', {event:'*', schema:'public', table:'patients'},
      payload => {
        handleDbChange('patients', payload);
      })
    .on('postgres_changes', {event:'*', schema:'public', table:'posts'},
      payload => {
        handleDbChange('posts', payload);
      })
    .on('postgres_changes', {event:'*', schema:'public', table:'notifications'},
      payload => {
        handleDbChange('notifications', payload);
      })
    .subscribe(status => {
      if(status === 'SUBSCRIBED') updateRtStatus('live');
      else if(status === 'CHANNEL_ERROR') updateRtStatus('offline');
      else updateRtStatus('connecting');
    });
}

function handleDbChange(table, payload) {
  const arr = table === 'patients' ? S.patients : table === 'posts' ? S.posts : S.notifs;
  const key = table === 'patients' ? 'id' : table === 'posts' ? 'id' : 'id';

  if(payload.eventType === 'INSERT') {
    const exists = arr.find(r => r[key] === payload.new[key]);
    if(!exists) {
      arr.unshift(payload.new);
      render();  /* 他端末からの投稿を即時表示 */
      if(table === 'notifications') {
        const myN = myNotifs();
        const isForMe = myN.find(n => n.id === payload.new.id);
        if(isForMe && !payload.new.read_by?.includes(S.user?.id)) {
          showToast('新着通知: ' + (payload.new.body||'').slice(0,20) + '...');
        }
      }
    }
  } else if(payload.eventType === 'UPDATE') {
    const idx = arr.findIndex(r => r[key] === payload.new[key]);
    if(idx >= 0) arr[idx] = payload.new;
  } else if(payload.eventType === 'DELETE') {
    const idx = arr.findIndex(r => r[key] === payload.old[key]);
    if(idx >= 0) arr.splice(idx, 1);
  }
  render();
}

function updateRtStatus(status) {
  S.realtimeStatus = status;
  const el = $('rt-status');
  if(!el) return;
  const labels = {live:'リアルタイム接続中', connecting:'接続中...', offline:'オフライン'};
  const dotCls = {live:'', connecting:' connecting', offline:' off'};
  el.innerHTML = `<span class="rt-dot${dotCls[status]}"></span>${labels[status]||status}`;
}

/* ---------- DB Write ---------- */
async function dbInsert(table, row) {
  if(!SB) return null;
  try {
    const {data, error} = await SB.from(table).insert(row).select().single();
    if(error) {
      console.error('[dbInsert]', table, 'error:', JSON.stringify(error));
      showToast(table + ' 保存失敗: ' + (error.message||error.code||'不明'));
      return null;
    }
    return data;
  } catch(e) {
    console.error('[dbInsert] exception:', table, e);
    showToast('通信エラーが発生しました');
    return null;
  }
}
async function dbUpdate(table, id, updates) {
  if(!SB) return;
  const {error} = await SB.from(table).update(updates).eq('id', id);
  if(error) { console.error(table, 'update error:', error); }
}

function myNotifs() {
  const u = S.user; if(!u) return [];
  return S.notifs.filter(n => {
    const to = Array.isArray(n.to_depts) ? n.to_depts : (n.to_depts ? [n.to_depts] : []);
    if(to.includes('全員') || to.includes('すべて')) return true;
    if(to.includes('ERスタッフ') && (u.role==='er_nurse'||u.role==='er_doctor'||u.role==='ce')) return true;
    if(to.includes('救急チーム') && (u.role==='er_nurse'||u.role==='er_doctor'||u.role==='ce')) return true;
    if(to.includes('看護部') && (u.role==='er_nurse'||u.role==='ward_nurse')) return true;
    if(to.includes('リハビリ')) return u.deptTag === 'リハビリ';
    if(to.includes('透析室'))  return u.deptTag === '透析室';
    return to.includes(u.deptTag);
  });
}

function myPosts() {

async function ack(postId) {
  const p = S.posts.find(p => p.id === postId);
  if(!p) return;
  const already = (p.acked_by || []);
  if(already.includes(S.user.id)) return;
  const newAcked = [...already, S.user.id];
  // オプティミスティック更新
  p.acked_by = newAcked;
  p.acked_by_names = [...(p.acked_by_names||[]), S.user.name];
  render();
  await dbUpdate('posts', postId, {acked_by: newAcked, acked_by_names: [...(p.acked_by_names||[])]});
}

  const n = S.notifs.find(n => n.id === nid);

  openSheet(S.selectedPtId);

function closeSheet() { S.sheet = false; S.editingPostId = null; S.shActs = []; S.shVitals = {sbp:'',dbp:'',hr:'',spo2:'',temp:'',gcs:''}; render(); }
function togMen(d) {
  if(d === 'すべて') {
    const allDepts = DEPTS.filter(x => x !== 'すべて');
    if(S.shMen.includes('すべて')) { S.shMen = []; }
    else { S.shMen = ['すべて', ...allDepts]; }
  } else {
    const i = S.shMen.indexOf(d);
    if(i >= 0) { S.shMen.splice(i, 1); S.shMen = S.shMen.filter(x=>x!=='すべて'); }
    else { S.shMen.push(d); }
  }
  render();
}
function togTag(t)  { const i=S.nf.tags.indexOf(t); if(i>=0)S.nf.tags.splice(i,1); else S.nf.tags.push(t); render(); }
function togND(d) {
  if(d === 'すべて') {
    const allDepts = DEPTS.filter(x => x !== 'すべて');
    if(S.nf.ndepts.includes('すべて')) { S.nf.ndepts = []; }
    else { S.nf.ndepts = ['すべて', ...allDepts]; }
  } else {
    const i = S.nf.ndepts.indexOf(d);
    if(i >= 0) { S.nf.ndepts.splice(i, 1); S.nf.ndepts = S.nf.ndepts.filter(x=>x!=='すべて'); }
    else { S.nf.ndepts.push(d); }
  }
  render();
}
function togProc(p) { const i=S.nf.procs.indexOf(p); if(i>=0)S.nf.procs.splice(i,1); else S.nf.procs.push(p); render(); }
function selAct(l) {
  const i = S.shActs.indexOf(l);
  if(i >= 0) {
    S.shActs.splice(i, 1);
  } else {
    S.shActs.push(l);
    const actDef = ALL_ACTIONS.find(function(a){ return a.label === l; });
    if(actDef && actDef.auto) {
      actDef.auto.forEach(function(d){ if(!S.shMen.includes(d)) S.shMen.push(d); });
    }
  }
  S.shAct = S.shActs[0] || null;
  render();
}
function selSex(s)  { S.nf.sex = s; render(); }
function selAge(a) { S.nf.age = a; render(); }
function selComplaint(v) {
  const prev = S.nf.complaint;
  S.nf.complaint = prev === v ? '' : v;
  if(S.nf.complaint === 'CPA') {
    S.nf.urgency = '最優先';
    if(!S.nf.ndepts.includes('ERスタッフ')) S.nf.ndepts.push('ERスタッフ');
    if(!S.nf.ndepts.includes('当直医'))    S.nf.ndepts.push('当直医');
  } else if(prev === 'CPA') {
    /* CPA解除時は緊急度をリセット */
    S.nf.urgency = '';
  }
  render();
}
function selUrg(v)  { S.nf.urgency = S.nf.urgency === v ? '' : v; render(); }
function selJcs(v)  { S.nf.jcs = S.nf.jcs === v ? '' : v; render(); }

async function editPost(postId) {
  const p = S.posts.find(p => p.id === postId);
  if(!p || (p.user_id !== S.user?.id && p.posted_by !== S.user?.name)) return;
  S.shPid = p.patient_id;
  S.shAct = p.tag;
  S.shMen = [...(p.mentions||[])];
  S.shMemo = p.body||'';
  S.editingPostId = postId;
  S.sheet = true;
  render();
}
async function deletePost(postId) {
  const p = S.posts.find(p => p.id === postId);
  if(!p || (p.user_id !== S.user?.id && p.posted_by !== S.user?.name)) return;
  if(!confirm('この投稿を取り消しますか？')) return;
  const idx = S.posts.findIndex(p => p.id === postId);
  if(idx >= 0) S.posts.splice(idx, 1);
  render();
  if(SB) await SB.from('posts').delete().eq('id', postId);
  showToast('投稿を取り消しました');
}
async function submitPost() {
  if(!S.shActs.length) { alert('アクションを選択してください'); return; }
  if(!SB) { showToast('DB未接続です'); return; }
  const act = ALL_ACTIONS.find(a => a.label === S.shActs[0]);
  const tagLabel = S.shActs.join(' / ');
  const v = S.shVitals;
  const vitalsText = (v.sbp||v.hr||v.spo2) ? ' [BP:' + (v.sbp&&v.dbp?v.sbp+'/'+v.dbp:v.sbp||'') + ' HR:' + (v.hr||'') + ' SpO2:' + (v.spo2||'') + (v.temp?' 体温:'+v.temp:'') + (v.gcs?' 意識:'+v.gcs:'') + ']' : '';
  const u = S.user;
  const now = new Date().toISOString();
  const postRow = {
    patient_id: S.shPid,
    posted_at: now,
    posted_by: u.name,
    dept: u.dept,
    tag: tagLabel,
    body: S.shMemo + vitalsText,
    mentions: S.shMen.includes('すべて') ? DEPTS.filter(d=>d!=='すべて') : S.shMen,
    acked_by: [],
    acked_by_names: [],
    urgent: false,
    user_id: u.id,
  };
  let saved;
  if(S.editingPostId) {
    await dbUpdate('posts', S.editingPostId, {tag:postRow.tag, body:postRow.body, mentions:postRow.mentions});
    const existing = S.posts.find(p => p.id === S.editingPostId);
    if(existing) { existing.tag = postRow.tag; existing.body = postRow.body; existing.mentions = postRow.mentions; }
    saved = existing;
    S.editingPostId = null;
    showToast('投稿を修正しました');
  } else {
    saved = await dbInsert('posts', postRow);
  }
  if(saved && act?.status) {
    await dbUpdate('patients', S.shPid, {status: act.status, updated_at: now});
    /* 患者ステータスをローカルにも即時反映 */
    const localPt = S.patients.find(p => p.id === S.shPid);
    if(localPt) localPt.status = act.status;
  }
  if(saved && S.shMen.length > 0) {
    const savedNotif = await dbInsert('notifications', {
      patient_id: S.shPid,
      sender: u.name,
      to_depts: S.shMen.includes('すべて') ? DEPTS.filter(d=>d!=='すべて') : S.shMen,
      body: S.shAct + (S.shMemo ? '：' + S.shMemo : ''),
      read_by: [],
      urgent: false,
      created_at: now,
    });
    /* 通知もローカルに即時追加 */
    if(savedNotif && !S.notifs.find(n => n.id === savedNotif.id)) {
      S.notifs.unshift(savedNotif);
    }
  }
  /* 投稿をローカルStateに即時追加（リアルタイム到着を待たない） */
  if(saved && !S.posts.find(p => p.id === saved.id)) {
    S.posts.unshift(saved);
  }
  S.sheet = false; S.shAct = null; S.shActs = []; S.shMen = []; S.shMemo = ''; S.shVitals = {sbp:'',dbp:'',hr:'',spo2:'',temp:'',gcs:''}; S.editingPostId = null;
  showToast('投稿しました');
  render();
  /* Push通知をEdge Functionに依頼 */
  if(saved && postRow.mentions && postRow.mentions.length > 0) {
    sendPushNotification({
      post_id:    saved.id,
      patient_id: postRow.patient_id,
      tag:        postRow.tag,
      body:       postRow.body,
      mentions:   postRow.mentions,
      posted_by:  postRow.posted_by,
      urgent:     postRow.urgent || false,
    });
  }
}

/* Edge Function 経由でPush通知を送信 */
async function sendPushNotification(data) {
  if(!SB) return;
  try {
    await fetch('https://geygkbkoppwyqiqbxalz.supabase.co/functions/v1/send-push', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer sb_publishable_S3tw2CoRQIb10pi8QHHspQ_YcxYDVR6',
      },
      body: JSON.stringify(data),
    });
  } catch(e) {
    console.error('[Push] 送信エラー:', e);
  }
}

async function submitNew() {
  const f = S.nf;
  const finalComplaint = f.complaintOther.trim() || f.complaint.trim();
  if(!finalComplaint) { alert('主訴を選択または入力してください'); return; }
  if(!f.age.trim())   { alert('年代を選択してください'); return; }
  if(!SB) { showToast('DB未接続です'); return; }
  const u = S.user;
  const now = new Date().toISOString();
  const urgLabel = {'最優先':'🔴最優先','緊急':'🟠緊急','準緊急':'🟡準緊急','安定':'🟢安定'};
  const bodyParts = [
    f.age + (f.sex||'') + ' ' + finalComplaint,
    f.arrivalTime ? '到着予定 ' + f.arrivalTime : '',
    f.urgency ? (urgLabel[f.urgency]||f.urgency) : '',
    f.jcs ? ('意識:' + f.jcs + (f.jcsNote ? ' (' + f.jcsNote + ')' : '')) : '',
    f.transport ? '搬送手段:' + f.transport : '',
    f.procs.length ? '処置:' + f.procs.join('・') : '',
    f.tags.length ? '【' + f.tags.join('・') + '】' : '',
  ].filter(Boolean).join(' / ');

  const pt = await dbInsert('patients', {
    complaint: finalComplaint,
    age: f.age.trim(),
    sex: f.sex || '不明',
    status: 'pre_arrival',
    urgency: f.urgency || null,
    jcs: f.jcs || null,
    jcs_note: f.jcsNote || null,
    transport: f.transport || null,
    procs: f.procs.length ? f.procs : null,
    tags: f.tags.length ? f.tags : null,
    created_at: now,
    updated_at: now,
    created_by: u.name,
  });
  if(!pt || !pt.id) {
    showToast('患者登録に失敗しました。再度お試しください。');
    return;
  }
  console.log('[submitNew] patient created:', pt.id);

  const savedPost = await dbInsert('posts', {
    patient_id: pt.id,
    posted_at: now,
    posted_by: u.name,
    dept: u.dept,
    tag: '搬送前通知',
    body: bodyParts,
    mentions: f.ndepts.length ? (f.ndepts.includes('すべて') ? DEPTS.filter(d=>d!=='すべて') : [...f.ndepts]) : null,
    acked_by: [],
    acked_by_names: [],
    urgent: false,
    user_id: u.id,
  });
  if(!savedPost) {
    showToast('投稿の保存に失敗しました');
    return;
  }
  console.log('[submitNew] post created:', savedPost.id);

  await dbInsert('notifications', {
    patient_id: pt.id,
    sender: u.name,
    to_depts: f.ndepts.length ? (f.ndepts.includes('すべて') ? DEPTS.filter(d=>d!=='すべて') : [...f.ndepts]) : null,
    body: '搬送前通知 ' + f.age + (f.sex||'') + ' ' + finalComplaint,
    read_by: [],
    urgent: false,
    created_at: now,
  });
  /* ローカルStateに即時追加（リアルタイム到着を待たない） */
  if(!S.patients.find(p => p.id === pt.id)) {
    /* chart_idはローカルに追加してから保存（DBカラムなし） */
    const ptWithChartId = Object.assign({}, pt, {chart_id: f.chartId ? f.chartId.trim() : null});
    S.patients.unshift(ptWithChartId);
  }
  if(!S.posts.find(p => p.id === savedPost.id)) S.posts.unshift(savedPost);

  S.nf = {complaint:'',complaintOther:'',age:'',sex:'',arrivalTime:'',urgency:'',jcs:'',jcsNote:'',transport:'',procs:[],tags:[],ndepts:['ERスタッフ','当直医'],chartId:''};
  showToast('搬送前通知を送信しました');
  /* 搬送前通知のPush */
  if(savedPost) {
    sendPushNotification({
      post_id:    savedPost.id,
      patient_id: pt.id,
      tag:        '搬送前通知',
      body:       bodyParts,
      mentions:   savedPost.mentions || [],
      posted_by:  u.name,
      urgent:     true,
    });
  }
  S.screen = 'feed';
  render();
}

function copyToClipboard(text) {

}

function saveSetup() {
  const url = ($('setup-url')||{}).value?.trim();
  const key = ($('setup-key')||{}).value?.trim();
  if(!url || !key) { alert('URLとAPIキーを入力してください'); return; }
  setCfg(url, key);
  if(initSupabase(url, key)) {
    showToast('接続設定を保存しました');
    S.screen = 'login';
    render();
  } else {
    alert('接続に失敗しました。URLとAPIキーを確認してください。');
  }
}

/* 患者選択用ソート関数 */
const URG_ORDER = {'最優先':0,'緊急':1,'準緊急':2,'安定':3,'':4};
const DONE_ST   = ['done','admission','examination'];
function sortPatientsForSelect(pts) {
  return pts.slice().sort(function(a, b) {
    /* 診察終了済みは末尾 */
    const aDone = DONE_ST.includes(a.status) ? 1 : 0;
    const bDone = DONE_ST.includes(b.status) ? 1 : 0;
    if(aDone !== bDone) return aDone - bDone;
    /* 緊急度 */
    const aUrg = URG_ORDER[a.urgency||''] ?? 4;
    const bUrg = URG_ORDER[b.urgency||''] ?? 4;
    if(aUrg !== bUrg) return aUrg - bUrg;
    /* 同緊急度内: 最終投稿時刻の新しい順 */
    const aPost = S.posts.filter(function(p){ return p.patient_id === a.id; })[0];
    const bPost = S.posts.filter(function(p){ return p.patient_id === b.id; })[0];
    const aTime = aPost ? new Date(aPost.posted_at).getTime() : new Date(a.created_at).getTime();
    const bTime = bPost ? new Date(bPost.posted_at).getTime() : new Date(b.created_at).getTime();
    return bTime - aTime;
  });
}

/* アクション別の返答選択肢 */
const ACK_RESPONSES = {
  'CT依頼':       ['確認しました','了承（15分以上待ち）','了承（30分以上待ち）'],
  'MRI依頼':      ['確認しました','了承（30分以上待ち）','了承（1時間以上待ち）'],
  '心カテ依頼':   ['確認しました','準備開始します','30分後に準備可能'],
  '輸血依頼':     ['確認しました','準備します（30分）','対応不可・他科へ連絡を'],
  '緊急透析依頼': ['確認しました','準備開始します','30分後に対応可能'],
  '採血依頼':     ['確認しました','処理中です'],
  '手術決定':     ['了承・準備開始','30分後に準備可能','確認しました'],
  '入院決定':     ['受入準備します','確認しました'],
};
const DEFAULT_RESPONSES = ['確認しました'];

function buildAckHtml(p) {
  if(!(p.mentions||[]).length) return '';
  const names  = p.acked_by_names || [];
  const myAck  = (p.acked_by||[]).includes(S.user && S.user.id);
  const pid    = String(p.id);
  /* タグが複数アクションのスラッシュ区切りの場合も考慮 */
  const tagParts = (p.tag || '').split(' / ').map(function(s){ return s.trim(); });
  let resps = DEFAULT_RESPONSES;
  for(var ti = 0; ti < tagParts.length; ti++) {
    if(ACK_RESPONSES[tagParts[ti]]) { resps = ACK_RESPONSES[tagParts[ti]]; break; }
  }
  const allMentioned = (p.mentions||[]);

  /* 通知対象者から未読者を判定（mentions に含まれる部署のユーザーで未確認の人） */
  const ackedIds = p.acked_by || [];
  const unreadUsers = USERS.filter(function(u2){
    if(ackedIds.includes(u2.id)) return false;
    const m = allMentioned;
    if(m.includes('ERスタッフ') && (u2.role==='er_nurse'||u2.role==='er_doctor'||u2.role==='ce')) return true;
    if(m.includes('救急チーム') && (u2.role==='er_nurse'||u2.role==='er_doctor'||u2.role==='ce')) return true;
    if(m.includes('放射線') && u2.role==='radiology') return true;
    if(m.includes('検査室') && u2.role==='lab') return true;
    if(m.includes('当直医') && u2.role==='oncall') return true;
    if(m.includes('病棟') && u2.role==='ward_nurse') return true;
    if(m.includes('薬局') && u2.role==='pharmacy') return true;
    return false;
  });

  const showPopup = S.showUnread === pid;
  let h = '<div style="margin-top:6px;display:flex;flex-direction:column;gap:3px;">';

  /* 確認者名を最大5名 + さらに表示 */
  const maxShow = 5;
  const expandKey = 'ackExp_' + pid.replace(/-/g,'_');
  const showAll = S[expandKey];
  const showNames = showAll ? names : names.slice(0, maxShow);
  showNames.forEach(function(n){ h += '<span class="ack-done" style="font-size:11px;">&#10003; ' + esc(n) + ' 確認済み</span>'; });
  if(!showAll && names.length > maxShow) {
    h += '<button style="font-size:10px;color:#007aff;border:none;background:none;text-align:left;padding:0;cursor:pointer;" data-expand="' + esc(pid) + '" onclick="event.stopPropagation();expandAck(this)">さらに ' + (names.length-maxShow) + '名を表示</button>';
  }

  /* 未読者ボタン */
  if(unreadUsers.length > 0) {
    h += '<div style="display:flex;align-items:center;gap:6px;margin-top:2px;">';
    h += '<span style="font-size:11px;color:#ff9500;font-weight:500;">⚠ 未読 ' + unreadUsers.length + '名</span>';
    h += '<button style="font-size:10px;color:#8e8e93;border:none;background:none;text-decoration:underline;cursor:pointer;padding:0;" data-pid="' + esc(pid) + '" onclick="event.stopPropagation();toggleUnread(this)">未読者を見る ▾</button>';
    h += '</div>';
    if(showPopup) {
      h += '<div style="background:#1c1c1e;color:#fff;border-radius:8px;padding:8px 11px;font-size:11px;margin-top:2px;display:flex;flex-direction:column;gap:4px;">';
      h += '<div style="font-size:10px;color:#8e8e93;margin-bottom:2px;">未読スタッフ</div>';
      unreadUsers.forEach(function(u2){
        h += '<div style="display:flex;align-items:center;gap:5px;"><div style="width:7px;height:7px;border-radius:50%;background:#ff9500;flex-shrink:0;"></div><span>' + esc(u2.name) + '（' + esc(u2.roleLabel) + '）</span></div>';
      });
      h += '</div>';
    }
  }

  /* 返答ボタン: 未確認 かつ 自分が通知先対象 かつ 投稿者本人でない場合に表示 */
  const isSelf = p.posted_by === (S.user && S.user.name);
  const isTarget = (function(){
    const m = allMentioned;
    const u2 = S.user;
    if(!u2) return false;
    if(m.includes('すべて') || m.includes('全員')) return true;
    if(m.includes('ERスタッフ') && (u2.role==='er_nurse'||u2.role==='er_doctor'||u2.role==='ce')) return true;
    if(m.includes('救急チーム') && (u2.role==='er_nurse'||u2.role==='er_doctor'||u2.role==='ce')) return true;
    if(m.includes('放射線') && u2.role==='radiology') return true;
    if(m.includes('検査室') && u2.role==='lab') return true;
    if(m.includes('当直医') && u2.role==='oncall') return true;
    if(m.includes('病棟') && u2.role==='ward_nurse') return true;
    if(m.includes('看護部') && (u2.role==='er_nurse'||u2.role==='ward_nurse')) return true;
    if(m.includes('薬局') && u2.role==='pharmacy') return true;
    if(m.includes('透析室') && u2.deptTag==='透析室') return true;
    if(m.includes('OP室') && u2.deptTag==='OP室') return true;
    return false;
  })();
  if(!myAck && isTarget && !isSelf) {
    h += '<div style="display:flex;gap:5px;flex-wrap:wrap;margin-top:4px;">';
    resps.forEach(function(r, i){
      const styles = [
        'font-size:11px;border-radius:7px;padding:5px 9px;border:1px solid;cursor:pointer;',
        i===0 ? 'color:#166534;border-color:#86efac;background:#f0fff4;' :
        i===1 ? 'color:#92400e;border-color:#fdba74;background:#fff8ee;' :
                'color:#991b1b;border-color:#fca5a5;background:#fff0f0;',
      ].join('');
      h += '<button style="' + styles + '" data-pid="' + esc(pid) + '" data-resp="' + esc(r) + '" onclick="event.stopPropagation();ackWithResp(this)"> ' + esc(r) + '</button>';
    });
    h += '</div>';
  }

  h += '</div>';
  return h;
}

async function ackWithResp(btn) {
  const pid  = btn.getAttribute('data-pid');
  const resp = btn.getAttribute('data-resp');
  if(!pid) return;
  const p = S.posts.find(p => p.id === pid);
  if(!p) return;
  const already = (p.acked_by || []);
  if(already.includes(S.user.id)) return;
  const newAcked = [...already, S.user.id];
  const newNames = [...(p.acked_by_names||[]), S.user.name + (resp !== '確認しました' ? '（' + resp + '）' : '')];
  p.acked_by = newAcked;
  p.acked_by_names = newNames;
  render();
  await dbUpdate('posts', pid, {acked_by: newAcked, acked_by_names: newNames});
}

        /* 直近の投稿bodyからバイタル情報を抽出 */

        const gcsM  = rest.match(/意識:([^\]]+)/);
        let chips = '';
        if(bp)    chips += '<span class="vital-chip">BP ' + esc(bp) + '</span>';
        if(hr)    chips += '<span class="vital-chip">HR ' + esc(hr) + '</span>';
        if(spo2)  chips += '<span class="vital-chip">SpO2 ' + esc(spo2) + '%</span>';
        if(tempM) chips += '<span class="vital-chip">体温 ' + esc(tempM[1]) + '℃</span>';
        if(gcsM)  chips += '<span class="vital-chip">' + esc(gcsM[1].trim()) + '</span>';
        return chips ? '<div class="vitals-row" style="margin-top:6px;"><span style="font-size:10px;color:#8e8e93;font-weight:500;margin-right:4px;">最新バイタル</span>' + chips + '</div>' : '';

  /* PATIENTS */
  if(S.screen === 'patients') {

    const DONE_STATUSES = ['done', 'admission', 'examination'];

      ? S.patients.filter(p => p.status === 'pre_arrival')

/* Base64URL → Uint8Array 変換（Push登録に必要） */
function urlBase64ToUint8Array(base64String) {
  const padding = '='.repeat((4 - base64String.length % 4) % 4);
  const base64 = (base64String + padding).replace(/-/g, '+').replace(/_/g, '/');
  const rawData = window.atob(base64);
  const outputArray = new Uint8Array(rawData.length);
  for(let i = 0; i < rawData.length; ++i) outputArray[i] = rawData.charCodeAt(i);
  return outputArray;
}

/* Push通知を登録してSupabaseに保存 */
async function registerPush(userId) {
  if(!('serviceWorker' in navigator) || !('PushManager' in window)) return;
  try {
    const reg  = await navigator.serviceWorker.ready;
    const perm = await Notification.requestPermission();
    if(perm !== 'granted') { console.log('通知許可が得られませんでした'); return; }
    const sub = await reg.pushManager.subscribe({
      userVisibleOnly: true,
      applicationServerKey: urlBase64ToUint8Array(VAPID_PUBLIC_KEY)
    });
    const subJson = JSON.stringify(sub);
    /* Supabaseのpush_subscriptionsテーブルに保存 */
    if(SB) {
      const userRole = S.user ? S.user.role : '';
      await SB.from('push_subscriptions').upsert({
        user_id:      userId,
        role:         userRole,
        subscription: subJson,
        updated_at:   new Date().toISOString()
      }, { onConflict: 'user_id' });
      console.log('[Push] 登録完了:', userId);
    }
  } catch(e) {
    console.error('[Push] 登録エラー:', e);
  }
}
